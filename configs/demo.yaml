seed: 123
device: "cpu"

data:
  n_train: 2000
  n_test: 1000
  n_mutations_max: 60
  vocab_size: 512
  n_modules: 12
  shift_strength_test: 0.8

model:
  embed_dim: 64
  set_hidden: 128
  attn_heads: 4
  dropout: 0.1

training:
  batch_size: 128
  lr: 0.001
  epochs: 12
  weight_decay: 0.0005

causal:
  bootstrap: 10
  edge_threshold: 0.6
